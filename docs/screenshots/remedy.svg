<text x="14" y="135.0" textLength="411.6" lengthAdjust="spacingAndGlyphs" xml:space="preserve"><tspan fill="#e6edf3">    </tspan><tspan fill="#7d8590">Alive↔Dead 6× in 2 h; currently dead for 3 h.</tspan></text>
<text x="14" y="153.0" textLength="604.8" lengthAdjust="spacingAndGlyphs" xml:space="preserve"><tspan fill="#e6edf3">    </tspan><tspan fill="#39c5cf">▎ </tspan><tspan fill="#e6edf3">Reachability runbook — a rebuild cannot repair an unreachable node</tspan></text>
<text x="14" y="171.0" textLength="504.0" lengthAdjust="spacingAndGlyphs" xml:space="preserve"><tspan fill="#e6edf3">      </tspan><tspan fill="#3fb950">▸</tspan><tspan fill="#e6edf3"> </tspan><tspan fill="#e6edf3">Ping the node (reachability request)</tspan><tspan fill="#e6edf3"> </tspan><tspan fill="#7d8590">[</tspan><tspan fill="#3fb950">safe</tspan><tspan fill="#7d8590"> · </tspan><tspan fill="#7d8590">source</tspan><tspan fill="#7d8590">]</tspan></text>
