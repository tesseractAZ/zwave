<text x="14" y="207.0" textLength="361.2" lengthAdjust="spacingAndGlyphs" xml:space="preserve"><tspan fill="#e6edf3">        </tspan><tspan fill="#3fb950">✓ helped 71% (n=7) vs 22% self-heal</tspan></text>
<text x="14" y="225.0" textLength="739.2" lengthAdjust="spacingAndGlyphs" xml:space="preserve"><tspan fill="#e6edf3">      </tspan><tspan fill="#7d8590">·</tspan><tspan fill="#e6edf3"> </tspan><tspan fill="#e6edf3">Power-cycle the device, then exclude/re-include if it persists</tspan><tspan fill="#e6edf3"> </tspan><tspan fill="#7d8590">[</tspan><tspan fill="#58a6ff">physical</tspan><tspan fill="#7d8590"> · </tspan><tspan fill="#7d8590">lore</tspan><tspan fill="#7d8590">]</tspan></text>
