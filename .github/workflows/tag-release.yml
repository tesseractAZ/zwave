name: Tag released version

# Post-merge half of the release pipeline.
#
# The `main` branch is governed by the `BranchAuth` ruleset (PR + verified
# signatures + CodeQL), so `release.yml` can no longer push the version bump
# straight to main — it opens an auto-merging PR instead. This workflow picks up
# once that "Release vX.Y.Z" commit lands on main: it creates the matching tag
# and kicks off the image build.
#
# Why a separate workflow: tagging has to happen AFTER the PR merges, which is a
# different event than the manual `release.yml` dispatch.
#
# Why we dispatch images.yml explicitly instead of relying on the tag push: a
# tag pushed with the default `GITHUB_TOKEN` does NOT trigger other workflows
# (GitHub's recursion guard). `workflow_dispatch` via the API is exempt, so we
# create the tag and then dispatch images.yml by hand.

on:
  push:
    branches: [main]
    paths:
      - 'zwave_tui/config.yaml'

permissions:
  contents: write   # create + push the tag
  actions: write    # dispatch images.yml

jobs:
  tag:
    name: Tag + trigger image build
    # Only act on the release-bump commit produced by release.yml's PR.
    if: startsWith(github.event.head_commit.message, 'Release v')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Create tag and dispatch the image build
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          v=$(grep -E '^version:' zwave_tui/config.yaml \
            | sed -E 's/version:[[:space:]]*"?([^"#]+)"?.*/\1/' \
            | tr -d '[:space:]')
          if [[ ! "$v" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "::error::Could not parse version from config.yaml (got '$v')"
            exit 1
          fi
          tag="v${v}"

          # Idempotent: if the tag already exists (re-run, or the version commit
          # didn't actually bump), do nothing.
          if git rev-parse -q --verify "refs/tags/${tag}" >/dev/null 2>&1 \
             || git ls-remote --exit-code --tags origin "refs/tags/${tag}" >/dev/null 2>&1; then
            echo "::notice::Tag ${tag} already exists — nothing to do."
            exit 0
          fi

          git config user.name  'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git tag -a "${tag}" -m "Release ${tag}"
          git push origin "${tag}"
          echo "Tagged ${tag}."

          # Tag push via GITHUB_TOKEN won't trigger images.yml (recursion guard),
          # so dispatch it. images.yml checks out the tag we just created.
          gh workflow run images.yml -f version="${v}"
          echo "Dispatched images.yml for ${v}."

      - name: Summary
        if: always()
        run: |
          {
            echo "## 🏷️ Tag-release"
            echo
            echo "If a new \`v*\` tag was created above, **\`images.yml\`** is now building"
            echo "the amd64 + aarch64 GHCR images and will cut the GitHub Release."
          } >> "$GITHUB_STEP_SUMMARY"
