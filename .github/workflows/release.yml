name: Release

# One-click release pipeline (ruleset-compatible).
#
# Trigger from GitHub: Actions → Release → "Run workflow". The workflow:
#   1. Computes the next version (semver bump or explicit override)
#   2. Refuses if the new tag already exists, so re-runs are idempotent
#   3. Builds release notes (from your `notes` input, or auto-generated from the
#      commit log since the previous tag)
#   4. Bumps `version:` in `zwave_tui/config.yaml` and prepends a CHANGELOG section
#   5. Opens a `release/vX.Y.Z` PR and enables auto-merge
#
# The `main` branch is protected by the `BranchAuth` ruleset (PR + verified
# signatures + CodeQL), so this workflow can't push to main directly — it goes
# through a PR. The squash-merge commit is GitHub-signed, satisfying the rules.
# Once the PR merges, `tag-release.yml` creates the tag and `images.yml` builds +
# publishes the GHCR images and cuts the GitHub Release.
#
# Home Assistant (the add-on repository) reads the bumped `version:` from
# `config.yaml` on main and surfaces a native Update button once the image is up.

on:
  workflow_dispatch:
    inputs:
      bump:
        description: "Version bump (used when 'version' is empty)"
        type: choice
        options: [patch, minor, major]
        default: patch
      version:
        description: "Explicit version, e.g. 0.2.0 — overrides 'bump'"
        type: string
        required: false
      notes:
        description: "Release notes (markdown). Leave empty to auto-generate from the commit log."
        type: string
        required: false
        default: ""

permissions:
  contents: write
  pull-requests: write   # open + auto-merge the release PR

jobs:
  release:
    name: Cut release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Compute next version
        id: ver
        # Pass the dispatch inputs through the environment (never interpolate
        # ${{ inputs.* }} directly into the shell — that is a script-injection
        # sink). Bash then treats them as plain data.
        env:
          IN_VERSION: ${{ inputs.version }}
          IN_BUMP: ${{ inputs.bump }}
        run: |
          set -euo pipefail
          current=$(grep -E '^version:' zwave_tui/config.yaml \
            | sed -E 's/version:[[:space:]]*"?([^"#]+)"?.*/\1/' \
            | tr -d '[:space:]')
          if [[ ! "$current" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "::error::Could not parse current version from config.yaml (got '$current')"
            exit 1
          fi

          if [[ -n "$IN_VERSION" ]]; then
            next="$IN_VERSION"
          else
            IFS='.' read -r maj min pat <<< "$current"
            case "$IN_BUMP" in
              major) next="$((maj + 1)).0.0" ;;
              minor) next="${maj}.$((min + 1)).0" ;;
              patch) next="${maj}.${min}.$((pat + 1))" ;;
              *) echo "::error::Unknown bump '$IN_BUMP'"; exit 1 ;;
            esac
          fi

          if [[ ! "$next" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "::error::Invalid next version '$next' (expected X.Y.Z)"
            exit 1
          fi
          if git rev-parse -q --verify "refs/tags/v${next}" >/dev/null 2>&1; then
            echo "::error::Tag v${next} already exists"
            exit 1
          fi

          echo "current=$current" >> "$GITHUB_OUTPUT"
          echo "next=$next" >> "$GITHUB_OUTPUT"
          echo "📦 Releasing v${current} → v${next}"

      - name: Build release notes
        id: notes
        env:
          USER_NOTES: ${{ inputs.notes }}
          PREV: ${{ steps.ver.outputs.current }}
        run: |
          set -euo pipefail
          notes_file=$(mktemp)
          if [[ -n "${USER_NOTES}" ]]; then
            printf '%s\n' "${USER_NOTES}" > "${notes_file}"
          else
            prev_tag="v${PREV}"
            if git rev-parse -q --verify "refs/tags/${prev_tag}" >/dev/null 2>&1; then
              {
                echo "Changes since ${prev_tag}:"
                echo
                git log --no-merges --pretty='- %s' "${prev_tag}..HEAD"
              } > "${notes_file}"
            else
              echo "_(see commit history for details — no previous tag found at ${prev_tag})_" > "${notes_file}"
            fi
          fi
          echo "notes_file=${notes_file}" >> "$GITHUB_OUTPUT"
          echo "── notes preview ────────────────────────────"
          cat "${notes_file}"
          echo "─────────────────────────────────────────────"

      - name: Update config.yaml + CHANGELOG.md
        env:
          NEXT: ${{ steps.ver.outputs.next }}
          NOTES_FILE: ${{ steps.notes.outputs.notes_file }}
        run: |
          set -euo pipefail
          # config.yaml: replace the version: line
          sed -i.bak -E 's/^version:[[:space:]]*"?[^"#]+"?/version: "'"$NEXT"'"/' zwave_tui/config.yaml
          rm -f zwave_tui/config.yaml.bak

          # CHANGELOG.md: prepend a new section before the most recent version section
          python3 - <<'PY'
          import os, re, datetime
          version = os.environ["NEXT"]
          today = datetime.datetime.utcnow().strftime("%Y-%m-%d")
          with open(os.environ["NOTES_FILE"]) as f:
              notes = f.read().strip() or "_(see commit history for details)_"

          with open("zwave_tui/CHANGELOG.md", "r") as f:
              content = f.read()
          new_section = f"## {version} — {today}\n\n{notes}\n\n"
          m = re.search(r"^## \d", content, re.MULTILINE)
          if m:
              content = content[:m.start()] + new_section + content[m.start():]
          else:
              content = content.rstrip() + "\n\n" + new_section
          with open("zwave_tui/CHANGELOG.md", "w") as f:
              f.write(content)
          PY

          echo "── config.yaml version line ─────────────────"
          grep '^version:' zwave_tui/config.yaml
          echo "── CHANGELOG.md head ────────────────────────"
          head -25 zwave_tui/CHANGELOG.md
          echo "─────────────────────────────────────────────"

      # The `main` branch is governed by the `BranchAuth` ruleset, which forbids
      # a direct push from github-actions[bot] (requires a PR + verified
      # signatures + CodeQL). So instead of pushing the bump straight to main,
      # we open a PR from a release branch and let it auto-merge. The branch
      # commit below is unsigned, but that is fine: it never lands on main
      # directly — the SQUASH-merge commit is authored by GitHub's web-flow key
      # (signature-verified), which satisfies the `required_signatures` rule.
      # Tagging + the image build happen post-merge in `tag-release.yml`.
      - name: Open release PR (auto-merge)
        # NOTE — auto-merge + required checks caveat: this PR is opened with the
        # default GITHUB_TOKEN. GitHub deliberately does NOT run workflows for
        # events raised by GITHUB_TOKEN (recursion guard), so if `main` is later
        # given a branch-protection rule that REQUIRES ci.yml / codeql.yml, those
        # checks never attach to this PR and `--auto` can never satisfy them.
        # Two ways to make the one-click release fully autonomous when that day
        # comes: (a) create a fine-grained PAT `RELEASE_PAT` and use it here AND
        # on the actions/checkout that pushes the branch, so the checks run; or
        # (b) accept that the owner admin-merges the release PR. Today `main` is
        # unprotected, so `--auto` merges immediately and this is moot.
        env:
          NEXT: ${{ steps.ver.outputs.next }}
          NOTES_FILE: ${{ steps.notes.outputs.notes_file }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          branch="release/v${NEXT}"
          git config user.name  'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git checkout -b "$branch"
          git add zwave_tui/config.yaml zwave_tui/CHANGELOG.md
          git commit -m "Release v${NEXT}"
          git push --force-with-lease origin "$branch"

          body_file="$(mktemp)"
          {
            echo "Automated release of **v${NEXT}** — bumps \`zwave_tui/config.yaml\` and prepends the CHANGELOG."
            echo
            echo "Merging this (squash) lands a GitHub-signed commit on \`main\`, which satisfies the \`BranchAuth\` ruleset. On merge, **\`tag-release.yml\`** tags \`v${NEXT}\` and triggers **\`images.yml\`** to build/publish the GHCR images and cut the GitHub Release."
            echo
            echo "---"
            echo
            echo "### Release notes"
            echo
            cat "${NOTES_FILE}"
          } > "$body_file"

          pr_url="$(gh pr create --base main --head "$branch" \
            --title "Release v${NEXT}" --body-file "$body_file")"
          echo "Opened ${pr_url}"

          # Auto-merge lands it as soon as required checks (and any required
          # review) pass. Degrade gracefully if repo auto-merge is disabled —
          # the PR can still be merged by hand.
          if gh pr merge "$pr_url" --squash --auto --delete-branch; then
            echo "auto_merge=enabled" >> "$GITHUB_OUTPUT" || true
          else
            echo "::notice::Auto-merge could not be enabled — merge ${pr_url} manually to finish the release."
          fi
          echo "PR_URL=${pr_url}" >> "$GITHUB_ENV"

      - name: Summary
        env:
          NEXT: ${{ steps.ver.outputs.next }}
        run: |
          {
            echo "## 🚀 Release v${NEXT} prepared"
            echo
            echo "A release PR was opened with **auto-merge** enabled: ${PR_URL:-(see PR list)}"
            echo
            echo "What happens next, automatically:"
            echo
            echo "1. The PR merges (as a signature-verified squash commit) once required checks — and any required review — pass."
            echo "2. **\`tag-release.yml\`** fires on the merge: it tags \`v${NEXT}\` and dispatches **\`images.yml\`**."
            echo "3. **\`images.yml\`** builds + publishes the amd64 + aarch64 GHCR images and creates the GitHub Release for v${NEXT}."
            echo
            echo "**The Release appearing on GitHub is the \"go ahead and update\" signal.** Then in Home Assistant:"
            echo
            echo "**Settings → Add-ons → Add-on Store → ⋮ → Check for updates**, open **Z-Wave TUI**, and click **Update**."
            echo
            echo "> If auto-merge is disabled on the repo, just click **Merge** on the PR above — steps 2–3 still run automatically."
          } >> "$GITHUB_STEP_SUMMARY"
