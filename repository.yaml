# Home Assistant add-on repository manifest.
#
# Adding this repo's URL under Settings → Add-ons → Add-on Store → ⋮ →
# Repositories makes "Z-Wave TUI" (in ./zwave_tui) installable as a
# first-class store add-on. Home Assistant then manages it natively — the Update
# button pulls the new prebuilt GHCR image when `version:` in
# zwave_tui/config.yaml bumps — with no local-folder git workflow and none of
# the local+image "hybrid" update friction.
name: tesseractAZ Z-Wave TUI
url: https://github.com/tesseractAZ/zwave
maintainer: tesseractAZ <epaschal@outlook.com>
