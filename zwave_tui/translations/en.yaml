# Home Assistant Configuration-page labels + inline help for the Z-Wave TUI add-on.
# HA renders each option's `name` as its field label and `description` as the
# plain-text helper line beneath it. Keys MUST match config.yaml options exactly
# (a typo silently falls back to the raw KEY with no warning). Port labels live in
# config.yaml `ports_description:` — kept single-source, so no `network:` block here.
configuration:
  log_level:
    name: Log Level
    description: Verbosity of the add-on log. info is the default; pick debug or trace for more detail when troubleshooting, or notice/warning/error/fatal to quiet routine output.
  signal_display:
    name: Signal Display Unit
    description: "How link quality is shown by default: margin (SNR margin over the live background-noise floor — recommended) or dbm (raw RSSI in dBm). Toggle at runtime in the TUI with the 't' key."
  refresh_interval:
    name: Refresh Interval (seconds)
    description: Seconds between live render refreshes and network_status roster polls. This poll is cheap and event-backed, so a low value (2s default) is fine. Range 1–30.
  route_poll_interval:
    name: Route Poll Interval (seconds)
    description: Seconds between the EXPENSIVE route / controller-statistics polls. These move slowly and are deliberately kept off the fast render tick to avoid hammering the mesh. 10s default, range 5–120.
  telnet_enabled:
    name: Enable Telnet TUI
    description: Serve the control-room TUI on the telnet port. There is NO authentication — keep it on a trusted LAN only. Turn off to expose the browser console (ingress /console) exclusively.
  telnet_port:
    name: Telnet Port
    description: TCP port for the telnet TUI. Default 2324 (chosen not to collide with other control-room add-ons). Published on the LAN; unauthenticated — trusted networks only.
  zwave_entry_id:
    name: Z-Wave JS Entry ID (optional)
    description: Override for the zwave_js config-entry id. Leave blank to auto-discover it via config_entries/get (recommended — survives re-adds of the integration). Set only if you run multiple zwave_js entries.
  ha_ws_url:
    name: Home Assistant WebSocket URL
    description: HA Core WebSocket URL the data layer connects to. Leave at the default ws://supervisor/core/websocket for a normal add-on install. Override only to talk to a driver server directly (advanced / phase 2).
  write_actions_enabled:
    name: Enable Write Actions
    description: Master gate for mutating actions (heal / rebuild routes / re-interview / remove-failed). Off in v0.1 keeps the add-on a pure read-only monitor. Even when on, network-disruptive actions still require confirmation below.
  confirm_destructive:
    name: Confirm Destructive Actions
    description: Require a second-key or typed confirmation before network-disruptive actions (rebuild-all-routes, remove-failed-node). Leave on unless you understand the mesh impact of skipping the prompt.
