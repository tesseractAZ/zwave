# Home Assistant Configuration-page labels + inline help for the Z-Wave TUI add-on.
# HA renders each option's `name` as its field label and `description` as the
# plain-text helper line beneath it. Keys MUST match config.yaml options exactly
# (a typo silently falls back to the raw KEY with no warning). Port labels live in
# config.yaml `ports_description:` — kept single-source, so no `network:` block here.
# The order here mirrors config.yaml for readability; HA orders the FORM by the
# `schema:` block, so keep the two in step there.
configuration:
  # ── Display & safety ────────────────────────────────────────────────────────
  signal_display:
    name: Signal display unit
    description: >-
      Default unit for link quality in the TUI. "margin" shows the SNR margin
      over the live background-noise floor (recommended); "dbm" shows raw RSSI.
      You can switch any time inside the TUI — press T (shown as [T] UNITS on the
      command bar).
  write_actions_enabled:
    name: Enable write actions
    description: >-
      Unlocks the Actions Menu (press A in the TUI) — ping, refresh values,
      re-interview, rebuild routes, and remove a failed node. Off keeps the
      add-on a pure read-only monitor. It is safe to leave on: every command must
      still be armed by typing the word CONFIRM before it runs.
  # ── Telnet access ──────────────────────────────────────────────────────────
  telnet_enabled:
    name: Enable telnet TUI
    description: >-
      Serve the full-screen TUI on the telnet port for terminals on your LAN.
      Telnet is unencrypted — on an untrusted network turn on the login gate
      below, or leave this off and use only the browser console in the HA
      sidebar.
  telnet_port:
    name: Telnet port
    description: >-
      TCP port for the telnet TUI, published on your LAN. Default 2324 (chosen to
      avoid clashing with other control-room add-ons).
  # ── Login gate ─────────────────────────────────────────────────────────────
  auth_enabled:
    name: Require login (direct access)
    description: >-
      Require a username and password for DIRECT access — telnet, or hitting the
      port directly. Access through the HA sidebar is already authenticated by
      Home Assistant and is not gated (unless you also turn on the next option).
      Add at least one user below first — with none configured, direct access is
      denied.
  auth_require_on_ingress:
    name: Also require login in the HA sidebar
    description: >-
      Also show the login gate when opening the console from the Home Assistant
      sidebar. Off by default (HA already authenticated you there); turn on only
      if you want a second prompt in front of the mesh controls.
  users:
    name: Login users
    description: >-
      Allowed logins for the TUI — add one row per user. The password may be
      plaintext (masked here, stored in the add-on options) or a
      scrypt:<salt>:<hash> string so no plaintext is stored. See the
      Documentation tab to generate a hash.
  auth_max_attempts:
    name: Max login attempts
    description: >-
      Failed password attempts allowed before the connection is dropped.
      Default 3.
  auth_idle_lock_min:
    name: Idle re-lock (minutes)
    description: >-
      Re-require login after this many minutes with no keystrokes on a signed-in
      session. 0 disables it. Applies only to sessions that passed the login gate
      — not HA-sidebar sessions.
  # ── Advanced ───────────────────────────────────────────────────────────────
  refresh_interval:
    name: Advanced — refresh interval (seconds)
    description: >-
      Seconds between live render refreshes and the cheap network_status roster
      poll. The default 2s is a good balance; lower is snappier, higher is
      lighter. Range 1–30.
  route_poll_interval:
    name: Advanced — route poll interval (seconds)
    description: >-
      Seconds between the heavier route- and controller-statistics polls, kept
      off the fast render tick so they don't hammer the mesh. Default 10s.
      Range 5–120.
  log_level:
    name: Advanced — log level
    description: >-
      Verbosity of the add-on log. "info" is the default; use debug or trace when
      troubleshooting, or warning/error to quiet routine output.
  zwave_entry_id:
    name: Advanced — Z-Wave JS entry ID
    description: >-
      Leave blank to auto-discover the zwave_js integration (recommended — it
      survives re-adds of the integration). Set an explicit config-entry id only
      if you run more than one zwave_js entry.
  ha_ws_url:
    name: Advanced — Home Assistant WebSocket URL
    description: >-
      Leave at the default ws://supervisor/core/websocket for a normal install.
      Override only to point the data layer at a different HA Core / driver
      WebSocket.
